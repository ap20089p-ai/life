<link rel="stylesheet" href="../css/login.css">
<script src="../js/script.js"></script>
<script src="../js/login.js"></script>

<section id="login" class="login-section">
    <div class="container">
        <a href="index.html" class="home-btn" onclick="closeSection(); return false;" title="Go to Home">🏠 Home</a>
        
        <h2 id="login-title">Donor Portal</h2>
        <p class="section-subtitle" id="login-subtitle">Select your login type to continue</p>

        <!-- Login Form Container -->
        <div class="login-form-container">
            <!-- Mode Tabs -->
            <div class="login-tabs">
                <button class="mode-tab active" onclick="switchLoginMode('donor')">👤 Donor Login</button>
                <button class="mode-tab" onclick="switchLoginMode('hospital')">🏥 Hospital Login</button>
            </div>

            <!-- Donor Login Form -->
            <form id="donor-login-form" class="login-form" style="display: block;" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email Address *</label>
                    <input type="email" id="login-email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group password-group">
                    <label for="login-password">Password *</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" name="password" required placeholder="Enter your password">
                        <button type="button" class="password-toggle" onclick="togglePassword('login-password')" title="Show/Hide Password">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" class="checkbox-label">Remember me</label>
                </div>

                <button type="submit" class="login-btn">Login as Donor</button>

                <div class="login-links">
                    <a href="#" onclick="openForgotPasswordModal(event)" class="forgot-password-link">Forgot Password?</a>
                </div>

                <div class="signup-link">
                    Don't have an account? <a href="#" onclick="loadSection('register')">Register as Donor</a>
                </div>
            </form>

            <!-- Hospital Login Form -->
            <form id="hospital-login-form" class="login-form" style="display: none;" onsubmit="handleHospitalLogin(event)">
                <div class="form-group">
                    <label for="hospital-login-email">Hospital Email *</label>
                    <input type="email" id="hospital-login-email" name="email" required placeholder="Enter your hospital email">
                </div>

                <div class="form-group password-group">
                    <label for="hospital-login-password">Password *</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="hospital-login-password" name="password" required placeholder="Enter your password">
                        <button type="button" class="password-toggle" onclick="togglePassword('hospital-login-password')" title="Show/Hide Password">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="hospital-remember" name="remember">
                    <label for="hospital-remember" class="checkbox-label">Remember me</label>
                </div>

                <button type="submit" class="login-btn">Login as Hospital</button>

                <div class="login-links">
                    <a href="#" onclick="openForgotPasswordModal(event)" class="forgot-password-link">Forgot Password?</a>
                </div>

                <div class="signup-link">
                    Don't have an account? <a href="#" onclick="loadSection('hospital-register')">Register as Hospital</a>
                </div>
            </form>
        </div>

        <!-- Login Info Section -->
        <div class="login-info-container">
           

            
    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="closeForgotPasswordModal()">✕</button>
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a password reset link.</p>
            
            <form class="forgot-password-form" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="forget-email">Email Address *</label>
                    <input type="email" id="forget-email" name="email" required placeholder="Enter your email address">
                </div>
                <div class="form-actions">
                    <button type="submit" class="apt-btn-save">Send Reset Link</button>
                    <button type="button" class="apt-btn-cancel" onclick="closeForgotPasswordModal()">Back</button>
                </div>
            </form>
        </div>
    </div>
</section>
