<link rel="stylesheet" href="../css/editProfile.css">
<script src="../js/editProfile.js"></script>
<section id="editProfile" class="edit-profile-section">
  <div class="container">
    <div class="top-actions">
      <button class="back-btn" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
    </div>
    
    <div class="stats-menu-container">
      <button class="stats-menu-btn" id="stats-menu-btn" aria-haspopup="true" aria-expanded="false">
        📊 My Stats
      </button>
      <div class="stats-dropdown hidden" id="stats-dropdown">
        <div class="stat-item">
          <span class="stat-label">Donations Made:</span>
          <span class="stat-value" id="stat-donations">—</span>
        </div>
      </div>
    </div>
    <div class="edit-card">
      <h2>Edit Profile</h2>
      <form class="edit-profile-form">
        <div class="form-row">
          <div class="form-group">
            <label for="ep-firstName">First Name *</label>
            <input type="text" id="ep-firstName" name="firstName" required>
          </div>
          <div class="form-group">
            <label for="ep-lastName">Last Name *</label>
            <input type="text" id="ep-lastName" name="lastName" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ep-email">Email *</label>
            <input type="email" id="ep-email" name="email" required>
          </div>
          <div class="form-group">
            <label for="ep-phone">Phone</label>
            <input type="tel" id="ep-phone" name="phone">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ep-bloodType">Blood Type *</label>
            <select id="ep-bloodType" name="bloodType" required>
              <option value="">Select</option>
              <option>O+</option>
              <option>O-</option>
              <option>A+</option>
              <option>A-</option>
              <option>B+</option>
              <option>B-</option>
              <option>AB+</option>
              <option>AB-</option>
            </select>
          </div>
          <div class="form-group">
            <label for="ep-weight">Weight (lbs) *</label>
            <input type="number" id="ep-weight" name="weight" min="0" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full-width">
            <label for="ep-address">Address *</label>
            <input type="text" id="ep-address" name="address" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ep-city">City *</label>
            <input type="text" id="ep-city" name="city" required>
          </div>
          <div class="form-group">
            <label for="ep-state">State *</label>
            <input type="text" id="ep-state" name="state" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ep-zipcode">Pin Code / Zipcode *</label>
            <input type="text" id="ep-zipcode" name="zipcode" required>
          </div>
          <div class="form-group">
            <label for="ep-dob">Date of Birth *</label>
            <input type="date" id="ep-dob" name="dateOfBirth" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ep-gender">Gender *</label>
            <select id="ep-gender" name="gender" required>
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full-width">
            <label for="ep-medical">Medical Conditions *</label>
            <textarea id="ep-medical" name="medicalConditions" rows="2" placeholder="List any medical conditions..." required></textarea>
          </div>
        </div>

        <div class="completion-status" id="profileCompletionStatus">
          <p id="completionMessage"></p>
          <div class="progress-bar">
            <div class="progress-fill" id="completionProgress"></div>
          </div>
        </div>

        <div class="form-row">
          <button type="submit" class="save-btn">Save Changes</button>
          <button type="button" class="cancel-btn" onclick="window.location.href='dashboard.html'">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</section>
